# Evaluation configuration for FinSage-7B (Phases 4, 5 & 7).

baseline:
  model_id: mistralai/Mistral-7B-Instruct-v0.3
  backend: mock
  test_file: data/datasets/test.jsonl
  output_dir: reports/figures
  max_examples: 200
  batch_size: 1
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  device: auto
  load_in_4bit: true
  save_every: 25

metrics:
  enabled:
    - exact_match
    - token_f1
    - rouge_l
    - numeric_match
    - classification_accuracy
    - lexical_faithfulness

finetuned:
  backend: mock
  model_id: mistralai/Mistral-7B-Instruct-v0.3
  adapter_path: checkpoints/finsage-7b
  merged_model_path: checkpoints/finsage-7b-merged
  test_file: data/datasets/test.jsonl
  baseline_results: reports/figures/baseline_results.json
  baseline_predictions: reports/figures/baseline_predictions.jsonl
  output_dir: reports/figures
  max_examples: 200
  batch_size: 1
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  device: auto
  load_in_4bit: true
  generate_report: true
  generate_charts: true
  export_pdf: false

comparison:
  primary_metrics:
    - token_f1
    - rouge_l
    - numeric_exact_match
    - classification_accuracy
    - lexical_faithfulness
  qualitative_examples: 5
  regression_examples: 5

models:
  base:
    name: base-mistral-7b
    model_id: mistralai/Mistral-7B-Instruct-v0.3
  finetuned:
    name: finsage-7b
    model_id: mistralai/Mistral-7B-Instruct-v0.3
    adapter_path: ./checkpoints/finsage-7b-adapter

dataset:
  test_path: ./data/datasets/test.jsonl

generation:
  max_new_tokens: 512
  temperature: 0.0
  top_p: 1.0

# task_type -> primary / secondary metric keys (see finsage.evaluation.metrics)
tasks:
  filing_qa:
    primary: exact_match
    secondary: f1
  risk_summary:
    primary: rouge_l
    secondary: bert_score
  metric_extraction:
    primary: numeric_exact_match
    secondary: unit_accuracy
  outlook_classification:
    primary: accuracy
    secondary: macro_f1
  hallucination_detection:
    primary: faithfulness
    secondary: citation_precision

judge:
  enabled: false
  provider: openai
  model: gpt-4o-mini

output:
  results_dir: ./reports
  figures_dir: ./reports/figures
