# Supervised fine-tuning (SFT) configuration for FinSage-7B.
# Mirrors transformers.TrainingArguments; consumed in Phase 6.
model:
  base_model_id: mistralai/Mistral-7B-Instruct-v0.3
  max_seq_length: 2048

training_arguments:
  output_dir: ./checkpoints/finsage-7b
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  bf16: true
  max_grad_norm: 0.3
  logging_steps: 25
  save_strategy: steps
  save_steps: 200
  eval_strategy: steps
  eval_steps: 200
  report_to: wandb
  seed: 42

dataset:
  train_path: ./data/datasets/train.jsonl
  validation_path: ./data/datasets/validation.jsonl

wandb:
  project: finsage-7b
  run_name: qlora-mistral-7b-v0.3
