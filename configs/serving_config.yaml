# Serving configuration for FinSage-7B (Phase 7 vLLM + Phase 8 API wrapper).

# Phase 8: public FastAPI wrapper.
api:
  host: 0.0.0.0
  port: 8080
  environment: development
  api_secret_key: change-me
  cors_allowed_origins:
    - http://localhost:3000
    - http://localhost:8501
  rate_limit_requests_per_minute: 60
  disclaimer_enabled: true
  log_request_body: false
  request_timeout_seconds: 60

# Phase 7: internal vLLM inference server.
vllm:
  model_path: checkpoints/finsage-7b-merged
  served_model_name: finsage-7b
  host: 0.0.0.0
  port: 8000
  dtype: auto
  max_model_len: 4096
  gpu_memory_utilization: 0.90
  tensor_parallel_size: 1
  max_num_seqs: 64
  trust_remote_code: false
  api_key:
  enable_lora: false
  lora_adapter_name: finsage-7b-adapter
  lora_adapter_path: checkpoints/finsage-7b

client:
  base_url: http://localhost:8000/v1
  model: finsage-7b
  timeout: 60
  max_tokens: 256
  temperature: 0.0

benchmark:
  num_requests: 20
  concurrency: 1
  prompt_tokens_target: 512
  output_tokens: 256

health:
  endpoint: http://localhost:8000/v1/models
  startup_timeout_seconds: 600
  poll_interval_seconds: 5
