# FinSage-7B — production-style full stack.
#
# Topology (public path):  browser → frontend (:3000) → api (:8080) → vllm (:8000) → model
#
# The `vllm` service requires an NVIDIA GPU + the NVIDIA Container Toolkit at
# runtime. Base compose ships standard config; for explicit GPU device
# reservations layer the override:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml up --build
#
# Secrets: set API_SECRET_KEY in your shell or a `.env` next to this file.
# Never commit a real secret. `change-me` is a placeholder for local dev only.
services:
  vllm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serving
    image: finsage-vllm:latest
    container_name: finsage-vllm
    # NOTE: port 8000 is exposed for LOCAL development convenience. In
    # production, treat vLLM as INTERNAL — remove this `ports` mapping and reach
    # it only via the `finsage-network` (the api service uses http://vllm:8000).
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /models/finsage-7b-merged
      SERVED_MODEL_NAME: finsage-7b
      VLLM_HOST: 0.0.0.0
      VLLM_PORT: "8000"
      DTYPE: auto
      MAX_MODEL_LEN: "4096"
      GPU_MEMORY_UTILIZATION: "0.90"
      TENSOR_PARALLEL_SIZE: "1"
      MAX_NUM_SEQS: "64"
    volumes:
      # Mount the merged model read-only. Build it first with merge_adapter.py.
      - ../checkpoints/finsage-7b-merged:/models/finsage-7b-merged:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    networks:
      - finsage-network
    # GPU access: use the gpu override (deploy.resources) or run the daemon with
    # the default `nvidia` runtime. See docker/docker-compose.gpu.yml.

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: finsage-api:latest
    container_name: finsage-api
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: production
      API_HOST: 0.0.0.0
      API_PORT: "8080"
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me}
      # Internal service DNS — the API reaches vLLM over the private network.
      VLLM_BASE_URL: http://vllm:8000/v1
      SERVED_MODEL_NAME: finsage-7b
      RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
      DISCLAIMER_ENABLED: "true"
      LOG_REQUEST_BODY: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - finsage-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    image: finsage-frontend:latest
    container_name: finsage-frontend
    ports:
      - "3000:3000"
    environment:
      # Server-side only — the API secret is injected by the Next.js /api proxy
      # route and is NEVER sent to the browser.
      API_BASE_URL: http://api:8080/v1
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me}
      NEXT_PUBLIC_DEMO_MODE: "false"
      NEXT_PUBLIC_APP_NAME: FinSage-7B
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finsage-network

networks:
  finsage-network:
    driver: bridge
