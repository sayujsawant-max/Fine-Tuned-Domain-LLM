# FinSage-7B stack. The CPU `api` and `frontend` services run anywhere; the
# `vllm` service (Phase 7) requires an NVIDIA GPU + the NVIDIA Container Toolkit.
# Topology: browser → frontend (:3000) → api (:8080) → vllm (:8000) → model.
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: finsage-api:latest
    container_name: finsage-api
    ports:
      - "8080:8080"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "8080"
      API_SECRET_KEY: change-me
      ENVIRONMENT: development
      # The API proxies to the internal vLLM service (service DNS name `vllm`).
      VLLM_BASE_URL: http://vllm:8000/v1
      SERVED_MODEL_NAME: finsage-7b
      RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
      DISCLAIMER_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8501"
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # --- Phase 7: vLLM inference server (GPU) -------------------------------
  # Requires an NVIDIA GPU and the NVIDIA Container Toolkit. Mount the merged
  # model read-only at /models/finsage-7b-merged.
  vllm:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serving
    image: finsage-vllm:latest
    container_name: finsage-vllm
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /models/finsage-7b-merged
      SERVED_MODEL_NAME: finsage-7b
      VLLM_HOST: 0.0.0.0
      VLLM_PORT: "8000"
      DTYPE: auto
      MAX_MODEL_LEN: "4096"
      GPU_MEMORY_UTILIZATION: "0.90"
    volumes:
      - ../checkpoints/finsage-7b-merged:/models/finsage-7b-merged:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    # GPU reservation (Compose v2 spec). If your Compose/daemon does not support
    # `deploy.resources`, run instead with: `docker run --gpus all ...`, or set
    # the default Docker runtime to `nvidia`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- Phase 9: frontend demo (Next.js, CPU) -----------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    image: finsage-frontend:latest
    container_name: finsage-frontend
    ports:
      - "3000:3000"
    environment:
      # Server-side only — the API secret is never sent to the browser.
      API_BASE_URL: http://api:8080/v1
      API_SECRET_KEY: change-me
      # With a live backend behind the proxy, disable demo fallback.
      NEXT_PUBLIC_DEMO_MODE: "false"
      NEXT_PUBLIC_APP_NAME: FinSage-7B
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
